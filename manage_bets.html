<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyFriends - ניהול</title>
    <link rel="stylesheet" href="style.css">
    <script src="function.js"></script>
</head>
<body>
    <nav id="main-nav"></nav>

    <h1>יצירת התערבות חדשה</h1>

    <div class="standalone-form">
        <div class="market-card">
            <form id="createBetForm" onsubmit="createBet(event)">
                <input type="text" id="betTitle" placeholder="כותרת ההימור" required>
                <select id="categorySelect" required onchange="checkCustomCat()"></select>
                <div id="customCategoryWrapper" class="hidden">
                    <input type="text" id="customCategory" placeholder="הזן קטגוריה חדשה">
                </div>
                <div>
                    <input type="text" id="betOption1" placeholder="אופציה א' (למשל: טראמפ)" required>
                    <input type="text" id="betOption2" placeholder="אופציה ב' (למשל: ביידן)" required>
                </div>
                <input type="number" id="betAmount" placeholder="סכום השתתפות" required min="1">
                <button type="submit" id="createBetBtn">צור התערבות חדשה</button>
            </form>
        </div>
    </div>

    <h1>ההתערבויות שפתחתי</h1>
    <div id="my-open-bets" class="gallery-container"></div>

    <h1>היסטוריית הימורים</h1>
    <div id="bet-history-container" class="gallery-container"></div>
    <footer id="main-footer"></footer>
</body>
</html>
