<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>PolyFriends - צור קשר</title>
    <link rel="stylesheet" href="style.css">
    <script src="function.js"></script>
</head>
<body>
    <nav id="main-nav"></nav>

    <h1 id="main-title">צוות המייסדים</h1>
    <div class="gallery-container">
        <a href="idanlin.html" class="profile-card">
            <img src="images\IdanLin.jpeg" alt="Idan Lin">
            <h3>עידן לין</h3>
        </a>
        <a href="guysahar.html" class="profile-card">
            <img src="images\GuySahar.png" alt="Guy Sahar">
            <h3>גיא סהר</h3>
        </a>
    </div>

    <h1 class="section-title">צור קשר</h1>
    <div class="standalone-form">
        <div class="market-card">
            <form onsubmit="handleFormSubmit(event)">
                <label>שם מלא:</label>
                <input type="text" name="fullname" placeholder="הכנס את שמך" required>
    
                <label>סוג פנייה:</label>
                <div class="bet-options-wrapper">
                    <label><input type="radio" name="subject" value="new_market" required> התערבות חדשה</label>
                    <label><input type="radio" name="subject" value="bug_report" required> דיווח על באג</label>
                </div>
    
                <div class="bet-options-wrapper">
                    <input type="checkbox" name="terms" value="agreed" id="termsCheck" required>
                    <label for="termsCheck" style="font-weight: normal; margin-bottom: 0;">מאשר את תקנון האתר</label>
                </div>
    
                <button type="submit" class="auth-btn">שלח פנייה</button>
            </form>
        </div>
    </div>
    <footer id="main-footer"></footer>

    <script>
        function handleFormSubmit(event) {
            event.preventDefault(); // מונע את רענון הדף בעת השליחה
            alert('ההודעה נשלחה בהצלחה לחברי הצוות!');
            event.target.reset(); // מאפס את הטופס
        }
    </script>
</body>
</html>
