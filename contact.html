<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyFriends - צור קשר</title>
    <link rel="stylesheet" href="style.css">
    <script src="function.js"></script>
</head>
<body>
    <nav id="main-nav"></nav>

    <h1>צוות המייסדים</h1>
    <div class="gallery-container">
        <a href="idanlin.html">
            <img src="images\IdanLin.jpeg" alt="Idan Lin">
            <h3>עידן לין</h3>
        </a>
        <a href="guysahar.html">
            <img src="images\GuySahar.png" alt="Guy Sahar">
            <h3>גיא סהר</h3>
        </a>
    </div>

    <h1>צור קשר</h1>
    <div class="standalone-form">
        <div class="market-card">
            <form action="contact_submit.php" method="post">
                <label>שם מלא:</label>
                <input type="text" name="fullname" placeholder="הכנס את שמך" required>
    
                <label>סוג פנייה:</label>
                <div>
                    <label><input type="radio" name="subject" value="new_market" required> התערבות חדשה</label>
                    <label><input type="radio" name="subject" value="bug_report" required> דיווח על באג</label>
                </div>
    
                <label>הודעה חופשית:</label>
                <textarea name="message" placeholder="כתוב את הודעתך כאן..." rows="5"></textarea>

                <div>
                    <input type="checkbox" name="terms" value="agreed" id="termsCheck" required>
                    <label for="termsCheck">מאשר את תקנון האתר</label>
                </div>

                <button type="submit">שלח פנייה</button>
            </form>
        </div>
    </div>
    <footer id="main-footer"></footer>

</body>
</html>
